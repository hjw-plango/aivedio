version: 1
description: 纪录片美学边界,分镜与即梦提示词必须遵守。

palette:
  saturation: low
  contrast: medium
  color_temperature: 偏暖,接近自然光
  forbidden:
    - 高饱和糖果色
    - 霓虹灯
    - 强渐变滤镜

camera:
  preferred:
    - 手持轻微微抖
    - 焦点呼吸
    - 缓慢推/拉
    - 固定机位
  forbidden:
    - 360 环绕
    - 极速变焦
    - 商业广告甩镜
    - 无人机大幅航拍俯冲

texture:
  required:
    - 真实材料纹理
    - 工具磨损
    - 粉尘 / 油痕 / 水迹
    - 老作坊杂物
  forbidden:
    - 塑料感
    - 过度干净
    - CGI 油画质感

framing:
  default_aspect: "16:9"
  vertical_aspect: "9:16"
  default_duration_seconds: 5
  imagery_max_seconds: 5
  establishing_max_seconds: 10
