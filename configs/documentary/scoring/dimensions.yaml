version: 1
description: 视频镜头评分维度。P0 用 5 分综合分,失败标签独立记录。

scale:
  type: integer
  min: 1
  max: 5
  thresholds:
    usable: 4   # >= 4 视为可用
    pilot_pass_rate: 0.6

description_per_score:
  5: 可直接用于成片,不需要后期修
  4: 基本可用,需轻微后期(调色、裁剪)
  3: 有明显问题但素材有参考价值,不能直接用
  2: AI 痕迹严重或事实错误,不可用
  1: 完全不可用(画面崩坏、主体错误)
