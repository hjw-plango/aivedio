version: 1
description: 失败标签(多选),用于人工评分后定位问题与触发提示词调整。

tags:
  - id: ai_face
    label: 出现合成感人脸
    rerun_hint: 加强"不出现人脸"约束,改用背影/手部/剪影。

  - id: plastic_texture
    label: 塑料 / 油画质感
    rerun_hint: 加强"真实材质、磨损、粉尘"描述,降低饱和。

  - id: wrong_craft
    label: 工艺步骤或器具错误
    rerun_hint: 补充具体工艺步骤描述,引用 FactCard。

  - id: ad_style
    label: 广告片风格,过度美化
    rerun_hint: 加强"手持、微抖、低饱和、不广告化"约束。

  - id: motion_error
    label: 运镜不自然或物理错误
    rerun_hint: 简化运镜描述,改为固定机位或缓慢平移。

  - id: layout_error
    label: 构图 / 空间关系错误
    rerun_hint: 明确画面主体位置和比例。

  - id: irrelevant
    label: 画面主体偏离提示词
    rerun_hint: 精简提示词,减少干扰描述。
